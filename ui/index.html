<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BonsaiChat</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebar-title">Chats</h3>
            <span onclick="toggleSidebar()">×</span>
        </div>

        <!-- View: Chats -->
        <div id="view-chats" class="sidebar-view">
            <div id="session-list" class="session-list"></div>
        </div>

        <!-- View: Settings (local-only — no provider/API key UI) -->
        <div id="view-settings" class="sidebar-view" style="display:none;">

            <!-- Bonsai status -->
            <div class="config-section">
                <label class="config-label">Local Model</label>
                <div class="bonsai-status-bar" id="bonsai-status-bar">
                    <span id="bonsai-status-dot" class="status-dot status-offline"></span>
                    <span id="bonsai-status-text">Setting up…</span>
                </div>
                <button id="btn-bonsai-retry" class="btn-bonsai-retry" style="display:none;"
                    onclick="retryBonsaiSetup()">↺ Retry</button>

                <!-- Download button — shown only when model is missing -->
                <button id="btn-download-model" class="btn-download" style="display:none;"
                    onclick="startModelDownload()">⬇ Download Model</button>
            </div>

            <!-- HF repo override (advanced) -->
            <div class="config-section" id="hf-config-section" style="display:none;">
                <label class="config-label">HF Repo (advanced)</label>
                <input type="text" id="hf-repo-input" class="config-input" placeholder="org/repo">
                <label class="config-label">Filename</label>
                <input type="text" id="hf-file-input" class="config-input" placeholder="model.gguf">
                <button class="btn-save" onclick="saveHfConfig()">Save</button>
            </div>
            <button class="btn-link" onclick="toggleHfConfig()">Advanced ▾</button>

            <hr class="divider">

            <!-- Knowledge Base -->
            <h4 style="margin:0 0 12px 0; font-size:0.9rem; font-weight:600">Knowledge Base</h4>
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                Drag PDF/CSV here<br>or Click to upload
            </div>
            <input type="file" id="file-input" multiple style="display:none" onchange="handleFileSelect(event)">
            <div id="sidebar-file-list" style="margin-top:12px"></div>
            <button class="btn-clear" onclick="clearRag()">Clear Context</button>
        </div>
    </div>

    <!-- Sidebar Toggles -->
    <div class="sidebar-toggle-group">
        <div class="sidebar-toggle-tab" onclick="toggleSidebar('chats')" id="tab-chats" title="Chats">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
        <div class="sidebar-toggle-tab" onclick="toggleSidebar('settings')" id="tab-settings" title="Settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4">
                </path>
            </svg>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="header">
            <div class="logo">🌿 BonsaiChat</div>
            <div class="header-controls">
                <button class="new-chat-btn" onclick="newChat()" title="Start a new conversation">+ New Chat</button>
                <span>Multi-Agent:</span>
                <input type="checkbox" id="agent-toggle" checked onchange="toggleAgents()">
            </div>
        </div>

        <div id="chat-history"></div>

        <div class="input-container">
            <div id="file-list"></div>
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Ask your agent…" onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendPrompt()">↑</button>
            </div>
        </div>
    </div>

    <!-- Checkpoint Sidebar (Right) -->
    <div id="checkpoint-sidebar">
        <div class="checkpoint-blocks" id="checkpoint-blocks"></div>
    </div>

    <!-- First-run / model-download overlay -->
    <div id="bonsai-setup-overlay">
        <div class="setup-overlay-inner">
            <div class="setup-leaf">🌿</div>
            <h2 class="setup-heading">Setting up Bonsai AI</h2>
            <p class="setup-sub" id="setup-overlay-sub">Loading model — this only happens once.<br>
                After this, Bonsai runs fully offline, forever.</p>
            <div class="progress-bar-bg setup-progress-bar">
                <div class="progress-bar-fill" id="setup-overlay-fill" style="width:0%"></div>
            </div>
            <div id="setup-overlay-label" class="setup-progress-label">Preparing…</div>
            <!-- Shown when model is absent and needs downloading -->
            <button id="btn-overlay-download" class="btn-download" style="display:none;"
                onclick="startModelDownload()">⬇ Download Model (~1 GB)</button>
        </div>
    </div>

    <script src="anime.min.js"></script>
    <script src="marked.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
